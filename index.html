<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#FF6B6B">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="KidZone">
  <title>KidZone Adventure</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --coral:  #FF6B6B; --orange: #FF8E53;
      --teal:   #4ECDC4; --yellow: #FFE66D;
      --mint:   #95E1D3; --pink:   #F38181;
      --sky:    #A8D8EA; --purple: #C3A6FF;
      --gold:   #FFD93D; --cream:  #FFFEF0;
      --dark:   #2D2D2D;
    }
    * {
      margin: 0; padding: 0; box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none; -webkit-user-select: none;
    }
    body {
      font-family: 'Fredoka One', 'Comic Sans MS', cursive;
      background: linear-gradient(145deg, #FF6B6B 0%, #FF8E53 40%, #FFE66D 100%);
      min-height: 100vh; overflow: hidden;
    }

    /* ── Floating BG deco ── */
    .bg-deco { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
    .bg-deco span {
      position: absolute; opacity: .1;
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0%   { transform: translateY(110vh) rotate(0deg); }
      100% { transform: translateY(-10vh) rotate(360deg); }
    }

    /* ── Screens ── */
    .screen {
      position: fixed; inset: 0; z-index: 1;
      display: flex; flex-direction: column; align-items: center;
      padding: 14px 14px 22px; overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      transition: opacity .32s ease, transform .32s ease;
    }
    .screen.hidden { opacity: 0; pointer-events: none; transform: scale(.96); }

    /* ══════════════ HOME ══════════════ */
    #home { gap: 11px; }

    .logo { text-align: center; padding-top: 4px; }
    .logo h1 {
      font-size: clamp(2rem, 9vw, 3.2rem);
      color: #fff; text-shadow: 4px 4px 0 rgba(0,0,0,.14); letter-spacing: 1px;
    }
    .logo p {
      font-family: 'Nunito', sans-serif; font-weight: 900;
      color: rgba(255,255,255,.85); font-size: .82rem;
      letter-spacing: 2.5px; text-transform: uppercase; margin-top: 2px;
    }

    .stars-badge {
      display: flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,.2);
      border: 2px solid rgba(255,255,255,.32);
      padding: 7px 20px; border-radius: 50px;
      color: #fff; font-size: 1rem;
    }
    .stars-badge .star { font-size: 1.25rem; }
    .stars-badge #total-stars-home { font-weight: 800; font-size: 1.1rem; }

    /* Age tabs */
    .age-tabs {
      display: flex; gap: 8px; width: 100%; max-width: 370px;
      justify-content: center;
    }
    .age-tab {
      flex: 1; padding: 8px 4px; border-radius: 14px;
      border: 2px solid rgba(255,255,255,.35);
      background: rgba(255,255,255,.15);
      color: #fff; font-family: 'Fredoka One', cursive;
      font-size: .88rem; cursor: pointer;
      transition: all .18s; text-align: center;
    }
    .age-tab .tab-badge { display: block; font-size: 1.15rem; }
    .age-tab .tab-lbl   { display: block; font-size: .78rem; opacity: .85; }
    .age-tab.active {
      background: rgba(255,255,255,.42);
      border-color: rgba(255,255,255,.7);
      transform: translateY(-2px);
      box-shadow: 0 4px 0 rgba(0,0,0,.1);
    }
    .age-tab:active { transform: translateY(1px); }

    /* Game cards */
    .games-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 11px; width: 100%; max-width: 370px;
    }
    .game-card {
      background: var(--cream); border-radius: 20px;
      padding: 16px 10px 13px; text-align: center; cursor: pointer;
      box-shadow: 0 6px 0 rgba(0,0,0,.12);
      transition: transform .12s, box-shadow .12s;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      position: relative; overflow: hidden;
    }
    .game-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 5px;
      background: var(--accent-color); border-radius: 20px 20px 0 0;
    }
    .game-card:active { transform: translateY(5px) scale(.97); box-shadow: 0 1px 0 rgba(0,0,0,.12); }
    .game-card .gi { font-size: 2.5rem; }
    .game-card .gn { font-size: .9rem; color: var(--dark); }
    .game-card .gs { font-size: .8rem; color: var(--dark); opacity: .85; font-family: 'Nunito', sans-serif; font-weight: 700; }

    /* ── Per-question countdown timer ── */
    .q-timer-wrap {
      position: relative; display: flex; align-items: center; justify-content: center;
      width: 48px; height: 48px; flex-shrink: 0;
    }
    .q-timer-svg {
      position: absolute; inset: 0;
      transform: rotate(-90deg);
    }
    .q-timer-bg  { fill: none; stroke: rgba(255,255,255,.22); stroke-width: 4; }
    .q-timer-arc {
      fill: none; stroke: #fff; stroke-width: 4; stroke-linecap: round;
      stroke-dasharray: 113; stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear, stroke .3s;
    }
    .q-timer-arc.warn   { stroke: var(--yellow); }
    .q-timer-arc.danger { stroke: var(--coral);  }
    .q-timer-num {
      font-family: 'Fredoka One', cursive; font-size: 1.05rem;
      color: #fff; position: relative; z-index: 1;
      transition: color .3s;
    }
    .q-timer-num.warn   { color: var(--yellow); }
    .q-timer-num.danger { color: var(--coral);  }

    /* Timer */
    .timer-box {
      width: 100%; max-width: 370px;
      background: rgba(255,255,255,.18);
      border: 2px solid rgba(255,255,255,.32);
      border-radius: 20px; padding: 11px 15px 10px;
      display: flex; flex-direction: column; align-items: center; gap: 7px;
    }
    .timer-label {
      font-family: 'Nunito', sans-serif; font-weight: 900;
      color: rgba(255,255,255,.88); font-size: .76rem;
      text-transform: uppercase; letter-spacing: 2px;
    }
    .timer-clock {
      font-size: 2.3rem; color: #fff;
      text-shadow: 2px 2px 0 rgba(0,0,0,.12); line-height: 1;
      transition: color .4s;
    }
    .timer-clock.warn { color: var(--yellow); }
    .timer-btns { display: flex; gap: 8px; }
    .tbtn {
      background: rgba(255,255,255,.22);
      border: 2px solid rgba(255,255,255,.4);
      color: #fff; font-family: 'Fredoka One', cursive; font-size: .85rem;
      padding: 5px 13px; border-radius: 50px; cursor: pointer; transition: all .14s;
    }
    .tbtn:active, .tbtn.on { background: rgba(255,255,255,.48); transform: scale(.95); }
    .timer-track { width: 100%; height: 6px; background: rgba(255,255,255,.2); border-radius: 4px; overflow: hidden; }
    .timer-fill  { height: 100%; background: #fff; border-radius: 4px; transition: width 1s linear; width: 0%; }

    /* ══════════════ GAME ══════════════ */
    #game { gap: 10px; }
    .game-hdr { display: flex; align-items: center; gap: 10px; width: 100%; max-width: 420px; }
    .back-btn {
      width: 40px; height: 40px; flex-shrink: 0;
      background: rgba(255,255,255,.26); border: none; border-radius: 50%;
      font-size: 1.15rem; cursor: pointer; color: #fff; transition: transform .12s;
      display: flex; align-items: center; justify-content: center;
    }
    .back-btn:active { transform: scale(.88); }
    .game-ttl {
      flex: 1; background: rgba(255,255,255,.2);
      border-radius: 11px; padding: 6px 12px; color: #fff; font-size: 1rem;
    }
    .score-pill {
      background: var(--gold); color: var(--dark);
      padding: 6px 12px; border-radius: 11px; font-size: .88rem; white-space: nowrap;
    }
    .prog-track {
      width: 100%; max-width: 420px; height: 7px;
      background: rgba(255,255,255,.24); border-radius: 4px; overflow: hidden;
    }
    .prog-fill { height: 100%; background: #fff; border-radius: 4px; transition: width .38s ease; width: 0%; }

    /* Game area card */
    .game-area {
      background: var(--cream); border-radius: 24px; padding: 18px 14px 16px;
      width: 100%; max-width: 420px; box-shadow: 0 8px 0 rgba(0,0,0,.1);
      min-height: 260px;
      display: flex; flex-direction: column; align-items: center; gap: 14px;
      transition: opacity .24s, transform .24s;
      overflow-y: auto;
    }
    .q-text {
      font-family: 'Nunito', sans-serif; font-weight: 900;
      font-size: .95rem; color: #777; text-align: center;
    }

    /* ── Shared display wrapper ── */
    .g-display {
      display: flex; flex-direction: column; align-items: center;
      width: 100%; gap: 12px;
    }

    /* ── Game-specific elements ── */
    .g-color {
      width: 108px; height: 108px; border-radius: 50%;
      box-shadow: 0 5px 0 rgba(0,0,0,.12), 0 0 0 5px var(--cream), 0 0 0 7px rgba(0,0,0,.08);
    }
    .g-emoji {
      font-size: 5.5rem; line-height: 1.1; text-align: center;
    }
    .g-flag {
      font-size: 5rem; line-height: 1.1; text-align: center;
    }
    .g-letter {
      width: 108px; height: 108px; border-radius: 22px;
      background: linear-gradient(135deg, var(--purple), var(--sky));
      display: flex; align-items: center; justify-content: center;
      font-size: 3.8rem; color: #fff; text-shadow: 3px 3px 0 rgba(0,0,0,.12);
      box-shadow: 0 6px 0 rgba(0,0,0,.1);
    }
    .g-word {
      display: flex; align-items: center; justify-content: center;
      padding: 10px 18px;
    }
    .g-math {
      display: inline-block;
      background: linear-gradient(135deg, #f0f0ff, #e8e0ff);
      padding: 14px 24px; border-radius: 16px;
      font-family: 'Fredoka One', cursive; font-size: 2rem;
      color: var(--dark); box-shadow: 0 4px 0 rgba(0,0,0,.08);
      text-align: center;
    }

    /* ── Option grids ── */
    .opts-2 {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; width: 100%;
    }
    .opts-4 {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 8px; width: 100%;
    }

    /* ── Base option button ── */
    .opt {
      border: none; cursor: pointer; border-radius: 14px;
      font-family: 'Fredoka One', cursive;
      box-shadow: 0 4px 0 rgba(0,0,0,.1);
      transition: transform .1s, box-shadow .1s;
      display: flex; align-items: center; justify-content: center;
    }
    .opt:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,.1); }

    .opt-color {
      height: 76px;
    }
    .opt-text {
      height: 60px; font-size: 1.1rem;
      background: linear-gradient(135deg, #f9f9f9, #efefef);
      border: 3px solid #e0e0e0; color: var(--dark);
      padding: 0 8px; text-align: center;
    }
    .opt-letter {
      height: 70px; font-size: 2.1rem;
      background: linear-gradient(135deg, #f9f9f9, #efefef);
      border: 3px solid #e0e0e0; color: var(--dark);
    }
    .opt-number {
      height: 52px; font-size: 1.35rem;
      background: var(--teal); color: #fff;
    }
    .opt-number-big {
      height: 66px; font-size: 1.5rem;
      background: var(--coral); color: #fff;
    }

    /* ── Shape buttons (used with inline cssText override in shapes.js) ── */
    .sopt {
      aspect-ratio: 1; border-radius: 15px; background: #f5f5f5;
      border: 3px solid #e2e2e2; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 0 rgba(0,0,0,.07); transition: all .12s;
    }
    .sopt:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,.07); }

    /* ── Count game ── */
    .animals-wrap {
      display: flex; flex-wrap: wrap; justify-content: center;
      gap: 5px; padding: 4px 6px; max-width: 300px;
    }
    .anim {
      font-size: 2.2rem;
      animation: popIn .3s cubic-bezier(.34,1.56,.64,1) backwards;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(.2) rotate(-20deg); }
      to   { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    /* ── Answer feedback states ── */
    .is-correct { animation: correctBounce .5s cubic-bezier(.34,1.56,.64,1); }
    .is-wrong   { animation: wrongShake .4s ease; }
    .hi-correct { background: #d4f5e9 !important; border-color: var(--teal) !important; }
    .hi-wrong   { background: #fde8e8 !important; border-color: var(--coral) !important; }
    @keyframes correctBounce { 0%,100% { transform: scale(1); } 40% { transform: scale(1.22); } }
    @keyframes wrongShake {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-7px); }
      40%     { transform: translateX(7px); }
      60%     { transform: translateX(-5px); }
      80%     { transform: translateX(5px); }
    }

    /* ══════════════ CELEBRATION ══════════════ */
    #celebration { justify-content: center; gap: 16px; }
    .cel-card {
      background: var(--cream); border-radius: 28px; padding: 32px 24px;
      text-align: center; width: 100%; max-width: 350px;
      box-shadow: 0 10px 0 rgba(0,0,0,.1);
    }
    .cel-emoji { font-size: 5rem; display: block; animation: bounce 1s infinite; }
    @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-14px); } }
    .cel-title { font-size: 2.2rem; color: var(--dark); margin: 8px 0 4px; }
    .cel-sub   { font-family: 'Nunito', sans-serif; font-weight: 700; color: #888; font-size: .88rem; }
    .stars-row { font-size: 2.2rem; margin: 7px 0; letter-spacing: 3px; }
    .cel-btn {
      margin-top: 14px; width: 100%;
      background: linear-gradient(135deg, var(--coral), var(--orange));
      color: #fff; border: none; font-family: 'Fredoka One', cursive;
      font-size: 1.2rem; padding: 14px 36px; border-radius: 50px; cursor: pointer;
      box-shadow: 0 6px 0 rgba(0,0,0,.12); transition: all .12s; display: block;
    }
    .cel-btn:active { transform: translateY(5px); box-shadow: 0 1px 0 rgba(0,0,0,.12); }

    /* Feedback emoji overlay */
    #feedback {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      pointer-events: none; z-index: 50;
    }
    #feedback-emoji {
      font-size: 5.5rem; opacity: 0; transform: scale(.2);
      transition: opacity .24s, transform .24s cubic-bezier(.34,1.56,.64,1);
    }
    #feedback-emoji.show { opacity: 1; transform: scale(1); }
    #feedback-emoji.hide { opacity: 0; transform: scale(.2) translateY(-28px); transition: all .22s ease; }

    /* Confetti */
    .confetti {
      position: fixed; border-radius: 2px;
      animation: cfall linear forwards; pointer-events: none; z-index: 200;
    }
    @keyframes cfall {
      0%   { transform: translateY(-10px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    /* Timer done alert */
    #timer-alert {
      position: fixed; top: 16px;
      left: 50%; transform: translateX(-50%) translateY(-130px);
      background: var(--cream); border-radius: 18px; padding: 14px 22px;
      box-shadow: 0 8px 28px rgba(0,0,0,.18); z-index: 300; text-align: center;
      transition: transform .48s cubic-bezier(.34,1.56,.64,1);
      font-size: .95rem; color: var(--dark); white-space: nowrap;
    }
    #timer-alert.show { transform: translateX(-50%) translateY(0); }
    #timer-alert .ta-big { font-size: 1.55rem; display: block; margin-bottom: 2px; }
  </style>
</head>
<body>

<!-- Floating bg deco -->
<div class="bg-deco" id="bg-deco"></div>

<!-- Feedback overlay -->
<div id="feedback"><div id="feedback-emoji">⭐</div></div>

<!-- Timer done alert -->
<div id="timer-alert">
  <span class="ta-big">🍽️ Time's Up!</span>
  Parents are ready for you! 😊
</div>

<!-- ═══════════════ HOME ═══════════════ -->
<div class="screen" id="home">
  <div class="logo">
    <h1>⭐ KidZone</h1>
    <p>Learn · Play · Have Fun</p>
  </div>

  <div class="stars-badge">
    <span class="star">⭐</span>
    <span id="total-stars-home">0</span>&nbsp;Stars Collected!
  </div>

  <!-- Age tabs (rendered by JS) -->
  <div class="age-tabs" id="age-tabs"></div>

  <!-- Game cards (rendered by JS) -->
  <div class="games-grid" id="games-grid"></div>

  <!-- Parent Timer -->
  <div class="timer-box">
    <div class="timer-label">⏰ Parent's Eating Time</div>
    <div class="timer-clock" id="timer-clock">--:--</div>
    <div class="timer-btns">
      <button class="tbtn" id="tbtn-15">15 min</button>
      <button class="tbtn" id="tbtn-20">20 min</button>
      <button class="tbtn" id="tbtn-30">30 min</button>
    </div>
    <div class="timer-track">
      <div class="timer-fill" id="timer-fill"></div>
    </div>
  </div>
</div>

<!-- ═══════════════ GAME ═══════════════ -->
<div class="screen hidden" id="game">
  <div class="game-hdr">
    <button class="back-btn" id="back-btn">←</button>
    <div class="game-ttl" id="game-ttl">Game</div>
    <div class="q-timer-wrap" id="q-timer-wrap">
      <svg class="q-timer-svg" viewBox="0 0 44 44">
        <circle class="q-timer-bg"  cx="22" cy="22" r="18"/>
        <circle class="q-timer-arc" cx="22" cy="22" r="18" id="q-timer-arc"/>
      </svg>
      <span class="q-timer-num" id="q-timer-num">--</span>
    </div>
    <div class="score-pill">⭐ <span id="game-score">0</span></div>
  </div>
  <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
  <div class="game-area" id="game-area"></div>
</div>

<!-- ═══════════════ CELEBRATION ═══════════════ -->
<div class="screen hidden" id="celebration">
  <div class="cel-card">
    <span class="cel-emoji">🎉</span>
    <div class="cel-title">Awesome!</div>
    <div class="cel-sub">You earned</div>
    <div class="stars-row" id="cel-stars">⭐⭐⭐</div>
    <div class="cel-sub">Total: <strong id="cel-total">0</strong> ⭐</div>
    <button class="cel-btn" id="play-more-btn">Play More! 🚀</button>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════
   UTILS
═══════════════════════════════════════════════════ */
function pick(arr)     { return arr[Math.floor(Math.random() * arr.length)]; }
function pickN(arr, n) { return shuffle([...arr]).slice(0, n); }
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* ═══════════════════════════════════════════════════
   ENGINE HELPERS (used by game modules)
═══════════════════════════════════════════════════ */
function addQ(area, text) {
  const p = document.createElement('p');
  p.className   = 'q-text';
  p.textContent = text;
  area.appendChild(p);
}

function makeDisplay() {
  const d = document.createElement('div');
  d.className = 'g-display';
  for (let i = 0; i < arguments.length; i++) d.appendChild(arguments[i]);
  return d;
}

/* ═══════════════════════════════════════════════════
   AGE GROUPS CONFIG
═══════════════════════════════════════════════════ */
const AGE_GROUPS = [
  { id: '3-4',  label: '3–4',  badge: '🌱', color: '#4ECDC4', timeLimit: 20,
    games: [
      { id: 'colors',   icon: '🎨', name: 'Color Match'  },
      { id: 'shapes',   icon: '🔷', name: 'Shapes!'      },
      { id: 'animals',  icon: '🦁', name: 'Animals'      },
      { id: 'bigsmall', icon: '🐘', name: 'Big & Small'  },
    ]
  },
  { id: '5-6',  label: '5–6',  badge: '⭐', color: '#FF6B6B', timeLimit: 15,
    games: [
      { id: 'count',     icon: '🔢', name: 'Count It!'   },
      { id: 'letters',   icon: '🔤', name: 'ABC Match'   },
      { id: 'easymath',  icon: '➕', name: 'Easy Math'   },
      { id: 'oddone',    icon: '🤔', name: 'Odd One Out' },
      { id: 'storymath', icon: '📖', name: 'Story Math'  },
    ]
  },
  { id: '7-8',  label: '7–8',  badge: '🚀', color: '#C3A6FF', timeLimit: 12,
    games: [
      { id: 'math20',    icon: '🧮', name: 'Math Race'   },
      { id: 'spellit',   icon: '✏️', name: 'Spell It!'   },
      { id: 'flags',     icon: '🌍', name: 'Flag Quiz'   },
      { id: 'pattern',   icon: '📊', name: 'Patterns'    },
      { id: 'wordbuild', icon: '🔤', name: 'Word Builder' },
    ]
  },
  { id: '9-10', label: '9–10', badge: '🏆', color: '#FF8E53', timeLimit: 10,
    games: [
      { id: 'multiply', icon: '✖️', name: 'Times Table'  },
      { id: 'divide',   icon: '➗', name: 'Division'     },
      { id: 'capitals', icon: '🌏', name: 'Capitals'     },
      { id: 'sequence', icon: '📈', name: 'Sequences'    },
    ]
  },
];

/* ═══════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════ */
let currentAge  = '5-6';   // default: sons are 6
let currentGame = null;    // current game id string
let qIndex      = 0;
let sessionSc   = 0;
let totalStars  = 0;
let gameStars   = {};      // { gameId: maxStars }
let canAns      = true;

let timerSec    = 0;
let timerTot    = 0;
let timerTick   = null;

let qTimerSec   = 0;
let qTimerTot   = 0;
let qTimerTick  = null;

const TOTAL_Q        = 8;
const CONF_COLORS    = ['#FF6B6B','#4ECDC4','#FFE66D','#C3A6FF','#FF8E53','#95E1D3'];
const FB_CORRECT     = ['⭐','🌟','✨','🎉','👏','🥳'];
const FB_WRONG       = ['🤔','💭','🔄'];

/* ═══════════════════════════════════════════════════
   HOME RENDERING
═══════════════════════════════════════════════════ */
function renderTabs() {
  const container = document.getElementById('age-tabs');
  container.replaceChildren();
  AGE_GROUPS.forEach(function(group) {
    const btn = document.createElement('button');
    btn.className = 'age-tab' + (group.id === currentAge ? ' active' : '');
    const badge = document.createElement('span');
    badge.className   = 'tab-badge';
    badge.textContent = group.badge;
    const lbl = document.createElement('span');
    lbl.className   = 'tab-lbl';
    lbl.textContent = group.label;
    btn.appendChild(badge);
    btn.appendChild(lbl);
    btn.addEventListener('click', function() {
      currentAge = group.id;
      renderTabs();
      renderCards();
    });
    container.appendChild(btn);
  });
}

function renderCards() {
  const container = document.getElementById('games-grid');
  container.replaceChildren();
  const group = AGE_GROUPS.find(function(g) { return g.id === currentAge; });
  if (!group) return;
  const accentColors = ['#4ECDC4','#FF6B6B','#FFE66D','#C3A6FF'];
  group.games.forEach(function(gameInfo, idx) {
    const card = document.createElement('div');
    card.className = 'game-card';
    card.style.setProperty('--accent-color', accentColors[idx % accentColors.length]);

    const gi = document.createElement('div');
    gi.className   = 'gi';
    gi.textContent = gameInfo.icon;

    const gn = document.createElement('div');
    gn.className   = 'gn';
    gn.textContent = gameInfo.name;

    const gs = document.createElement('div');
    gs.className   = 'gs';
    gs.id          = 'gs-' + gameInfo.id;
    const stars    = gameStars[gameInfo.id] || 0;
    gs.textContent = '⭐ ' + stars + ' star' + (stars !== 1 ? 's' : '');

    card.appendChild(gi);
    card.appendChild(gn);
    card.appendChild(gs);
    card.addEventListener('click', function() { startGame(gameInfo.id, gameInfo.name, gameInfo.icon); });
    container.appendChild(card);
  });
}

function refreshHomeStars() {
  const el = document.getElementById('total-stars-home');
  if (el) el.textContent = totalStars;
  // Refresh any visible card star counts
  Object.keys(gameStars).forEach(function(gid) {
    const gsEl = document.getElementById('gs-' + gid);
    if (gsEl) {
      const s = gameStars[gid];
      gsEl.textContent = '⭐ ' + s + ' star' + (s !== 1 ? 's' : '');
    }
  });
}

/* ═══════════════════════════════════════════════════
   SCREEN MANAGEMENT
═══════════════════════════════════════════════════ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.add('hidden'); });
  document.getElementById(id).classList.remove('hidden');
}

function goHome() {
  stopQTimer();
  showScreen('home');
  refreshHomeStars();
  renderCards();
  currentGame = null;
}

/* ═══════════════════════════════════════════════════
   PER-QUESTION TIMER
═══════════════════════════════════════════════════ */
const Q_TIMER_CIRC = 113; // 2π × r18 ≈ 113.1

function getTimeLimit() {
  var group = AGE_GROUPS.find(function(g) { return g.id === currentAge; });
  return group ? group.timeLimit : 15;
}

function startQTimer() {
  stopQTimer();
  qTimerTot = getTimeLimit();
  qTimerSec = qTimerTot;
  updateQTimerUI();
  qTimerTick = setInterval(function() {
    qTimerSec--;
    updateQTimerUI();
    if (qTimerSec <= 0) {
      stopQTimer();
      if (canAns) {
        canAns = false;
        showFeedback('⏰');
        setTimeout(function() { qIndex++; nextQ(); }, 830);
      }
    }
  }, 1000);
}

function stopQTimer() {
  if (qTimerTick) { clearInterval(qTimerTick); qTimerTick = null; }
}

function updateQTimerUI() {
  var numEl = document.getElementById('q-timer-num');
  var arcEl = document.getElementById('q-timer-arc');
  if (!numEl || !arcEl) return;
  var pct = qTimerTot > 0 ? qTimerSec / qTimerTot : 1;
  numEl.textContent = qTimerSec;
  arcEl.style.strokeDashoffset = Q_TIMER_CIRC * (1 - pct);
  var isWarn   = pct <= 0.5 && pct > 0.25;
  var isDanger = pct <= 0.25;
  arcEl.classList.toggle('warn',   isWarn);
  arcEl.classList.toggle('danger', isDanger);
  numEl.classList.toggle('warn',   isWarn);
  numEl.classList.toggle('danger', isDanger);
}

/* ═══════════════════════════════════════════════════
   GAME FLOW
═══════════════════════════════════════════════════ */
function startGame(gameId, gameName, gameIcon) {
  currentGame = gameId;
  qIndex      = 0;
  sessionSc   = 0;
  canAns      = true;
  document.getElementById('game-ttl').textContent   = (gameIcon || '') + ' ' + (gameName || gameId);
  document.getElementById('game-score').textContent = '0';
  document.getElementById('prog-fill').style.width  = '0%';
  showScreen('game');
  nextQ();
}

function nextQ() {
  if (qIndex >= TOTAL_Q) { endGame(); return; }
  canAns = true;
  document.getElementById('prog-fill').style.width = ((qIndex / TOTAL_Q) * 100) + '%';

  const area = document.getElementById('game-area');
  area.style.opacity   = '0';
  area.style.transform = 'translateY(8px)';

  setTimeout(function() {
    area.replaceChildren();
    dispatchGame(currentGame, area);
    area.style.transition = 'opacity .26s, transform .26s';
    area.style.opacity    = '1';
    area.style.transform  = 'translateY(0)';
    startQTimer();
  }, 120);
}

function dispatchGame(gameId, area) {
  switch(gameId) {
    case 'colors':   setup_colors(area);   break;
    case 'shapes':   setup_shapes(area);   break;
    case 'animals':  setup_animals(area);  break;
    case 'bigsmall': setup_bigsmall(area); break;
    case 'count':    setup_count(area);    break;
    case 'letters':  setup_letters(area);  break;
    case 'easymath': setup_easymath(area); break;
    case 'oddone':   setup_oddone(area);   break;
    case 'math20':   setup_math20(area);   break;
    case 'spellit':  setup_spellit(area);  break;
    case 'flags':    setup_flags(area);    break;
    case 'pattern':  setup_pattern(area);  break;
    case 'multiply':  setup_multiply(area);  break;
    case 'divide':    setup_divide(area);    break;
    case 'capitals':  setup_capitals(area);  break;
    case 'sequence':  setup_sequence(area);  break;
    case 'storymath': setup_storymath(area); break;
    case 'wordbuild': setup_wordbuild(area); break;
  }
}

/* ═══════════════════════════════════════════════════
   ANSWER HANDLING
═══════════════════════════════════════════════════ */
function onCorrect() {
  stopQTimer();
  canAns = false;
  sessionSc++;
  document.getElementById('game-score').textContent = sessionSc;
  showFeedback(pick(FB_CORRECT));
  spawnConfetti();
  setTimeout(function() { qIndex++; nextQ(); }, 830);
}

function onWrong() {
  stopQTimer();
  canAns = false;  // Modules restore canAns=true after their own timeout
  showFeedback(pick(FB_WRONG));
}

function showFeedback(em) {
  const el = document.getElementById('feedback-emoji');
  el.textContent = em;
  el.classList.remove('hide');
  el.classList.add('show');
  setTimeout(function() {
    el.classList.remove('show');
    el.classList.add('hide');
    setTimeout(function() { el.classList.remove('hide'); }, 300);
  }, 660);
}

/* ═══════════════════════════════════════════════════
   CONFETTI
═══════════════════════════════════════════════════ */
function spawnConfetti() {
  for (var i = 0; i < 22; i++) {
    var el        = document.createElement('div');
    var isCircle  = Math.random() > 0.5;
    el.className  = 'confetti';
    el.style.left              = (Math.random() * 100) + 'vw';
    el.style.top               = '-8px';
    el.style.background        = pick(CONF_COLORS);
    el.style.width             = (5 + Math.random() * 8) + 'px';
    el.style.height            = (5 + Math.random() * 8) + 'px';
    el.style.borderRadius      = isCircle ? '50%' : '2px';
    el.style.animationDelay    = (Math.random() * 0.35) + 's';
    el.style.animationDuration = (1.1 + Math.random() * 0.9) + 's';
    document.body.appendChild(el);
    setTimeout(function() { el.remove(); }, 2300);
  }
}

/* ═══════════════════════════════════════════════════
   END GAME
═══════════════════════════════════════════════════ */
function endGame() {
  var earned = Math.min(3, Math.max(1, Math.ceil((sessionSc / TOTAL_Q) * 3)));
  totalStars += earned;
  gameStars[currentGame] = Math.max(gameStars[currentGame] || 0, earned);

  try {
    localStorage.setItem('totalStars', String(totalStars));
    localStorage.setItem('gameStars', JSON.stringify(gameStars));
  } catch (e) {}

  document.getElementById('cel-stars').textContent =
    '⭐'.repeat(earned) + '☆'.repeat(3 - earned);
  document.getElementById('cel-total').textContent = totalStars;

  for (var b = 0; b < 4; b++) (function(delay) {
    setTimeout(spawnConfetti, delay);
  })(b * 240);

  showScreen('celebration');
  refreshHomeStars();
}

/* ═══════════════════════════════════════════════════
   TIMER
═══════════════════════════════════════════════════ */
function setTimer(min, btnId) {
  if (timerTick) clearInterval(timerTick);
  timerTot = timerSec = min * 60;
  document.querySelectorAll('.tbtn').forEach(function(b) { b.classList.remove('on'); });
  document.getElementById(btnId).classList.add('on');
  updateTimerDisplay();
  timerTick = setInterval(function() {
    timerSec--;
    updateTimerDisplay();
    if (timerSec <= 0) { clearInterval(timerTick); fireTimerAlert(); }
  }, 1000);
}

function updateTimerDisplay() {
  var m  = Math.floor(timerSec / 60);
  var s  = timerSec % 60;
  var cl = document.getElementById('timer-clock');
  cl.textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  cl.classList.toggle('warn', timerSec > 0 && timerSec <= 120);
  var pct = timerTot > 0 ? ((timerTot - timerSec) / timerTot) * 100 : 0;
  document.getElementById('timer-fill').style.width = pct + '%';
}

function fireTimerAlert() {
  var el = document.getElementById('timer-alert');
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 6500);
}

/* ═══════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════ */
(function init() {
  // Load persisted stars
  try {
    var ts = localStorage.getItem('totalStars');
    if (ts != null) totalStars = parseInt(ts, 10) || 0;
    var gs = localStorage.getItem('gameStars');
    if (gs) {
      var parsed = JSON.parse(gs);
      if (parsed && typeof parsed === 'object') gameStars = parsed;
    }
  } catch (e) {}

  // Floating background emojis
  var DECOS  = ['⭐','🌈','🎈','🌟','💫','✨','🎀','🍭','🎠','🌺','🦋','🐝'];
  var bgWrap = document.getElementById('bg-deco');
  DECOS.forEach(function(em, i) {
    var s   = document.createElement('span');
    s.textContent = em;
    var dur = 12 + Math.random() * 14;
    s.style.left              = (5 + (i / DECOS.length) * 90) + '%';
    s.style.fontSize          = (1.5 + Math.random() * 1.5) + 'rem';
    s.style.animationDuration = dur + 's';
    s.style.animationDelay    = (-Math.random() * dur) + 's';
    bgWrap.appendChild(s);
  });

  // Render home (and show loaded total stars)
  renderTabs();
  renderCards();
  refreshHomeStars();

  // Timer buttons
  document.getElementById('tbtn-15').addEventListener('click', function() { setTimer(15, 'tbtn-15'); });
  document.getElementById('tbtn-20').addEventListener('click', function() { setTimer(20, 'tbtn-20'); });
  document.getElementById('tbtn-30').addEventListener('click', function() { setTimer(30, 'tbtn-30'); });

  // Nav
  document.getElementById('back-btn').addEventListener('click', goHome);
  document.getElementById('play-more-btn').addEventListener('click', goHome);
})();
</script>
