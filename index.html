<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>KidZone Adventure</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --coral:  #FF6B6B; --orange: #FF8E53;
      --teal:   #4ECDC4; --yellow: #FFE66D;
      --mint:   #95E1D3; --pink:   #F38181;
      --sky:    #A8D8EA; --purple: #C3A6FF;
      --gold:   #FFD93D; --cream:  #FFFEF0;
      --dark:   #2D2D2D;
    }
    * {
      margin: 0; padding: 0; box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none; -webkit-user-select: none;
    }
    body {
      font-family: 'Fredoka One', 'Comic Sans MS', cursive;
      background: linear-gradient(145deg, #FF6B6B 0%, #FF8E53 40%, #FFE66D 100%);
      min-height: 100vh; overflow: hidden;
    }

    /* ── Floating BG deco ── */
    .bg-deco { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
    .bg-deco span {
      position: absolute; opacity: .1;
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0%   { transform: translateY(110vh) rotate(0deg); }
      100% { transform: translateY(-10vh) rotate(360deg); }
    }

    /* ── Screens ── */
    .screen {
      position: fixed; inset: 0; z-index: 1;
      display: flex; flex-direction: column; align-items: center;
      padding: 14px 14px 22px; overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      transition: opacity .32s ease, transform .32s ease;
    }
    .screen.hidden { opacity: 0; pointer-events: none; transform: scale(.96); }

    /* ══════════════ HOME ══════════════ */
    #home { gap: 13px; }

    .logo { text-align: center; padding-top: 6px; }
    .logo h1 {
      font-size: clamp(2.2rem, 10vw, 3.5rem);
      color: #fff; text-shadow: 4px 4px 0 rgba(0,0,0,.14); letter-spacing: 1px;
    }
    .logo p {
      font-family: 'Nunito', sans-serif; font-weight: 900;
      color: rgba(255,255,255,.85); font-size: .88rem;
      letter-spacing: 2.5px; text-transform: uppercase; margin-top: 2px;
    }

    .stars-badge {
      display: flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,.2);
      border: 2px solid rgba(255,255,255,.32);
      padding: 9px 22px; border-radius: 50px;
      color: #fff; font-size: 1.1rem;
    }
    .stars-badge .star { font-size: 1.35rem; }

    .games-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 12px; width: 100%; max-width: 370px;
    }
    .game-card {
      background: var(--cream); border-radius: 22px;
      padding: 18px 12px 14px; text-align: center; cursor: pointer;
      box-shadow: 0 6px 0 rgba(0,0,0,.12);
      transition: transform .12s, box-shadow .12s;
      display: flex; flex-direction: column; align-items: center; gap: 5px;
      position: relative; overflow: hidden;
    }
    .game-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 5px;
      background: var(--accent); border-radius: 22px 22px 0 0;
    }
    .game-card:active { transform: translateY(5px) scale(.97); box-shadow: 0 1px 0 rgba(0,0,0,.12); }
    .game-card .gi { font-size: 2.7rem; }
    .game-card .gn { font-size: .95rem; color: var(--dark); }
    .game-card .gs { font-size: .75rem; color: #aaa; font-family: 'Nunito', sans-serif; font-weight: 700; }

    /* Timer */
    .timer-box {
      width: 100%; max-width: 370px;
      background: rgba(255,255,255,.18);
      border: 2px solid rgba(255,255,255,.32);
      border-radius: 22px; padding: 13px 17px 11px;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
    }
    .timer-label {
      font-family: 'Nunito', sans-serif; font-weight: 900;
      color: rgba(255,255,255,.88); font-size: .78rem;
      text-transform: uppercase; letter-spacing: 2px;
    }
    .timer-clock {
      font-size: 2.5rem; color: #fff;
      text-shadow: 2px 2px 0 rgba(0,0,0,.12); line-height: 1;
      transition: color .4s;
    }
    .timer-clock.warn { color: var(--yellow); }
    .timer-btns { display: flex; gap: 8px; }
    .tbtn {
      background: rgba(255,255,255,.22);
      border: 2px solid rgba(255,255,255,.4);
      color: #fff; font-family: 'Fredoka One', cursive; font-size: .88rem;
      padding: 6px 14px; border-radius: 50px; cursor: pointer; transition: all .14s;
    }
    .tbtn:active, .tbtn.on { background: rgba(255,255,255,.48); transform: scale(.95); }
    .timer-track { width: 100%; height: 7px; background: rgba(255,255,255,.2); border-radius: 4px; overflow: hidden; }
    .timer-fill  { height: 100%; background: #fff; border-radius: 4px; transition: width 1s linear; width: 0%; }

    /* ══════════════ GAME ══════════════ */
    #game { gap: 11px; }
    .game-hdr { display: flex; align-items: center; gap: 10px; width: 100%; max-width: 420px; }
    .back-btn {
      width: 42px; height: 42px; flex-shrink: 0;
      background: rgba(255,255,255,.26); border: none; border-radius: 50%;
      font-size: 1.2rem; cursor: pointer; color: #fff; transition: transform .12s;
      display: flex; align-items: center; justify-content: center;
    }
    .back-btn:active { transform: scale(.88); }
    .game-ttl {
      flex: 1; background: rgba(255,255,255,.2);
      border-radius: 12px; padding: 7px 13px; color: #fff; font-size: 1.05rem;
    }
    .score-pill {
      background: var(--gold); color: var(--dark);
      padding: 7px 13px; border-radius: 12px; font-size: .9rem; white-space: nowrap;
    }
    .prog-track {
      width: 100%; max-width: 420px; height: 8px;
      background: rgba(255,255,255,.24); border-radius: 4px; overflow: hidden;
    }
    .prog-fill { height: 100%; background: #fff; border-radius: 4px; transition: width .38s ease; width: 0%; }

    /* Game area card */
    .game-area {
      background: var(--cream); border-radius: 26px; padding: 20px 16px;
      width: 100%; max-width: 420px; box-shadow: 0 8px 0 rgba(0,0,0,.1);
      min-height: 280px;
      display: flex; flex-direction: column; align-items: center; gap: 16px;
      transition: opacity .24s, transform .24s;
    }
    .q-text {
      font-family: 'Nunito', sans-serif; font-weight: 900;
      font-size: 1rem; color: #777; text-align: center;
    }

    /* Color game */
    .color-target {
      width: 108px; height: 108px; border-radius: 50%;
      box-shadow: 0 5px 0 rgba(0,0,0,.12), 0 0 0 5px var(--cream), 0 0 0 7px rgba(0,0,0,.08);
    }
    .color-target.pulse { animation: colorPop .42s ease; }
    @keyframes colorPop { 50% { transform: scale(1.13); } }
    .color-opts { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; width: 100%; }
    .copt {
      height: 76px; border-radius: 15px; cursor: pointer;
      box-shadow: 0 5px 0 rgba(0,0,0,.11);
      transition: transform .1s, box-shadow .1s;
      display: flex; align-items: center; justify-content: center;
    }
    .copt:active { transform: translateY(4px); box-shadow: 0 1px 0 rgba(0,0,0,.11); }

    /* Count game */
    .animals-wrap { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; padding: 4px 6px; max-width: 300px; }
    .anim { font-size: 2.2rem; animation: popIn .3s cubic-bezier(.34,1.56,.64,1) backwards; }
    @keyframes popIn {
      from { opacity: 0; transform: scale(.2) rotate(-20deg); }
      to   { opacity: 1; transform: scale(1) rotate(0deg); }
    }
    .num-opts { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; width: 100%; }
    .nopt {
      aspect-ratio: 1; border-radius: 13px; background: var(--teal); color: #fff;
      font-size: 1.45rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 0 rgba(0,0,0,.12); transition: transform .1s, box-shadow .1s;
    }
    .nopt:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,.12); }

    /* Shape game */
    .shape-display  { width: 108px; height: 108px; display: flex; align-items: center; justify-content: center; }
    .shape-opts     { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; }
    .sopt {
      aspect-ratio: 1; border-radius: 15px; background: #f5f5f5; border: 3px solid #e2e2e2;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 0 rgba(0,0,0,.07); transition: all .12s;
    }
    .sopt:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,.07); }

    /* Letter game */
    .letter-big {
      width: 108px; height: 108px; border-radius: 22px;
      background: linear-gradient(135deg, var(--purple), var(--sky));
      display: flex; align-items: center; justify-content: center;
      font-size: 3.8rem; color: #fff; text-shadow: 3px 3px 0 rgba(0,0,0,.12);
      box-shadow: 0 6px 0 rgba(0,0,0,.1);
    }
    .letter-opts { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; width: 100%; }
    .lopt {
      height: 70px; border-radius: 14px;
      background: linear-gradient(135deg, #f9f9f9, #efefef); border: 3px solid #e0e0e0;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.1rem; cursor: pointer; color: var(--dark);
      box-shadow: 0 4px 0 rgba(0,0,0,.07); transition: all .12s;
    }
    .lopt:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,.07); }

    /* Answer feedback states */
    .is-correct { animation: correctBounce .5s cubic-bezier(.34,1.56,.64,1); }
    .is-wrong   { animation: wrongShake .4s ease; }
    .hi-correct { background: #d4f5e9 !important; border-color: var(--teal) !important; }
    .hi-wrong   { background: #fde8e8 !important; border-color: var(--coral) !important; }
    @keyframes correctBounce { 0%,100% { transform: scale(1); } 40% { transform: scale(1.22); } }
    @keyframes wrongShake {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-7px); }
      40%     { transform: translateX(7px); }
      60%     { transform: translateX(-5px); }
      80%     { transform: translateX(5px); }
    }

    /* ══════════════ CELEBRATION ══════════════ */
    #celebration { justify-content: center; gap: 16px; }
    .cel-card {
      background: var(--cream); border-radius: 28px; padding: 34px 26px;
      text-align: center; width: 100%; max-width: 350px;
      box-shadow: 0 10px 0 rgba(0,0,0,.1);
    }
    .cel-emoji { font-size: 5rem; display: block; animation: bounce 1s infinite; }
    @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-14px); } }
    .cel-title { font-size: 2.3rem; color: var(--dark); margin: 8px 0 4px; }
    .cel-sub   { font-family: 'Nunito', sans-serif; font-weight: 700; color: #888; font-size: .9rem; }
    .stars-row { font-size: 2.3rem; margin: 7px 0; letter-spacing: 3px; }
    .cel-btn {
      margin-top: 14px; width: 100%;
      background: linear-gradient(135deg, var(--coral), var(--orange));
      color: #fff; border: none; font-family: 'Fredoka One', cursive;
      font-size: 1.2rem; padding: 14px 36px; border-radius: 50px; cursor: pointer;
      box-shadow: 0 6px 0 rgba(0,0,0,.12); transition: all .12s; display: block;
    }
    .cel-btn:active { transform: translateY(5px); box-shadow: 0 1px 0 rgba(0,0,0,.12); }

    /* Feedback emoji overlay */
    #feedback {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      pointer-events: none; z-index: 50;
    }
    #feedback-emoji {
      font-size: 5.5rem; opacity: 0; transform: scale(.2);
      transition: opacity .24s, transform .24s cubic-bezier(.34,1.56,.64,1);
    }
    #feedback-emoji.show { opacity: 1; transform: scale(1); }
    #feedback-emoji.hide { opacity: 0; transform: scale(.2) translateY(-28px); transition: all .22s ease; }

    /* Confetti */
    .confetti {
      position: fixed; border-radius: 2px;
      animation: cfall linear forwards; pointer-events: none; z-index: 200;
    }
    @keyframes cfall {
      0%   { transform: translateY(-10px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    /* Timer done alert */
    #timer-alert {
      position: fixed; top: 16px;
      left: 50%; transform: translateX(-50%) translateY(-130px);
      background: var(--cream); border-radius: 18px; padding: 14px 22px;
      box-shadow: 0 8px 28px rgba(0,0,0,.18); z-index: 300; text-align: center;
      transition: transform .48s cubic-bezier(.34,1.56,.64,1);
      font-size: .95rem; color: var(--dark); white-space: nowrap;
    }
    #timer-alert.show { transform: translateX(-50%) translateY(0); }
    #timer-alert .ta-big { font-size: 1.55rem; display: block; margin-bottom: 2px; }
  </style>
</head>
<body>

<!-- Floating bg deco (emojis added by JS) -->
<div class="bg-deco" id="bg-deco"></div>

<!-- Feedback overlay -->
<div id="feedback"><div id="feedback-emoji">⭐</div></div>

<!-- Timer done alert -->
<div id="timer-alert">
  <span class="ta-big">🍽️ Time's Up!</span>
  Parents are ready for you! 😊
</div>

<!-- ═══════════════ HOME ═══════════════ -->
<div class="screen" id="home">
  <div class="logo">
    <h1>⭐ KidZone</h1>
    <p>Learn · Play · Have Fun</p>
  </div>

  <div class="stars-badge">
    <span class="star">⭐</span>
    <span id="total-stars-home">0</span>&nbsp;Stars Collected!
  </div>

  <div class="games-grid">
    <div class="game-card" style="--accent:var(--teal)" id="card-colors">
      <div class="gi">🎨</div>
      <div class="gn">Color Match</div>
      <div class="gs" id="gs-colors">⭐ 0 stars</div>
    </div>
    <div class="game-card" style="--accent:var(--coral)" id="card-count">
      <div class="gi">🔢</div>
      <div class="gn">Count It!</div>
      <div class="gs" id="gs-count">⭐ 0 stars</div>
    </div>
    <div class="game-card" style="--accent:var(--yellow)" id="card-shapes">
      <div class="gi">🔷</div>
      <div class="gn">Shapes!</div>
      <div class="gs" id="gs-shapes">⭐ 0 stars</div>
    </div>
    <div class="game-card" style="--accent:var(--purple)" id="card-letters">
      <div class="gi">🔤</div>
      <div class="gn">ABC Match</div>
      <div class="gs" id="gs-letters">⭐ 0 stars</div>
    </div>
  </div>

  <!-- Parent Timer -->
  <div class="timer-box">
    <div class="timer-label">⏰ Parent's Eating Time</div>
    <div class="timer-clock" id="timer-clock">--:--</div>
    <div class="timer-btns">
      <button class="tbtn" id="tbtn-15">15 min</button>
      <button class="tbtn" id="tbtn-20">20 min</button>
      <button class="tbtn" id="tbtn-30">30 min</button>
    </div>
    <div class="timer-track">
      <div class="timer-fill" id="timer-fill"></div>
    </div>
  </div>
</div>

<!-- ═══════════════ GAME ═══════════════ -->
<div class="screen hidden" id="game">
  <div class="game-hdr">
    <button class="back-btn" id="back-btn">←</button>
    <div class="game-ttl" id="game-ttl">Game</div>
    <div class="score-pill">⭐ <span id="game-score">0</span></div>
  </div>
  <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
  <div class="game-area" id="game-area">
    <!-- ── Question text ── -->
    <p class="q-text" id="q-text"></p>

    <!-- ── Color game ── -->
    <div class="color-target" id="cg-target" style="display:none"></div>
    <div class="color-opts" id="cg-opts" style="display:none">
      <div class="copt" id="copt-0"></div>
      <div class="copt" id="copt-1"></div>
      <div class="copt" id="copt-2"></div>
      <div class="copt" id="copt-3"></div>
    </div>

    <!-- ── Count game ── -->
    <div class="animals-wrap" id="kg-animals" style="display:none"></div>
    <div class="num-opts" id="kg-nums" style="display:none">
      <div class="nopt" id="nopt-0"></div><div class="nopt" id="nopt-1"></div>
      <div class="nopt" id="nopt-2"></div><div class="nopt" id="nopt-3"></div>
      <div class="nopt" id="nopt-4"></div><div class="nopt" id="nopt-5"></div>
      <div class="nopt" id="nopt-6"></div><div class="nopt" id="nopt-7"></div>
    </div>

    <!-- ── Shape game ── -->
    <div class="shape-display" id="sg-display" style="display:none"></div>
    <div class="shape-opts" id="sg-opts" style="display:none">
      <div class="sopt" id="sopt-0"></div><div class="sopt" id="sopt-1"></div>
      <div class="sopt" id="sopt-2"></div><div class="sopt" id="sopt-3"></div>
    </div>

    <!-- ── Letter game ── -->
    <div class="letter-big" id="lg-big" style="display:none"></div>
    <div class="letter-opts" id="lg-opts" style="display:none">
      <div class="lopt" id="lopt-0"></div><div class="lopt" id="lopt-1"></div>
      <div class="lopt" id="lopt-2"></div><div class="lopt" id="lopt-3"></div>
    </div>
  </div>
</div>

<!-- ═══════════════ CELEBRATION ═══════════════ -->
<div class="screen hidden" id="celebration">
  <div class="cel-card">
    <span class="cel-emoji">🎉</span>
    <div class="cel-title">Awesome!</div>
    <div class="cel-sub">You earned</div>
    <div class="stars-row" id="cel-stars">⭐⭐⭐</div>
    <div class="cel-sub">Total: <strong id="cel-total">0</strong> ⭐</div>
    <button class="cel-btn" id="play-more-btn">Play More! 🚀</button>
  </div>
</div>

<script>
/* ══════════════════════════════════════
   DATA
══════════════════════════════════════ */
const COLORS = [
  { name:'Red',    hex:'#FF6B6B' }, { name:'Blue',   hex:'#4ECDC4' },
  { name:'Yellow', hex:'#FFE66D' }, { name:'Green',  hex:'#95E1D3' },
  { name:'Purple', hex:'#C3A6FF' }, { name:'Orange', hex:'#FF8E53' },
  { name:'Pink',   hex:'#F38181' }, { name:'Sky',    hex:'#A8D8EA' },
];

const ANIMALS = ['🐶','🐱','🐰','🦊','🐻','🐼','🐨','🐯','🐸','🐧'];

const SHAPE_NAMES   = ['Circle','Square','Triangle','Star','Heart','Diamond'];
const SHAPE_COLORS  = ['#FF6B6B','#4ECDC4','#FFE66D','#C3A6FF','#F38181','#FF8E53'];

// Letters A–R for simpler matching
const LETTERS = 'ABCDEFGHIJKLMNOPQR'.split('').map(u => ({ u, l: u.toLowerCase() }));

const GAME_TITLES = {
  colors:'🎨 Color Match', count:'🔢 Count It!',
  shapes:'🔷 Shapes!',     letters:'🔤 ABC Match',
};

const CONF_COLORS = ['#FF6B6B','#4ECDC4','#FFE66D','#C3A6FF','#FF8E53','#95E1D3'];
const FB_CORRECT  = ['⭐','🌟','✨','🎉','👏','🥳'];
const FB_WRONG    = ['🤔','💭','🔄'];
const TOTAL_Q     = 8;

/* ══════════════════════════════════════
   STATE
══════════════════════════════════════ */
let game       = null;
let qIndex     = 0;
let sessionSc  = 0;
let totalStars = 0;
let gameStars  = { colors:0, count:0, shapes:0, letters:0 };
let canAns     = true;

let timerSec   = 0;
let timerTot   = 0;
let timerTick  = null;

/* ══════════════════════════════════════
   INIT
══════════════════════════════════════ */
(function init() {
  // BG deco
  const DECOS = ['⭐','🌈','🎈','🌟','💫','✨','🎀','🍭','🎠','🌺','🦋','🐝'];
  const bgWrap = document.getElementById('bg-deco');
  DECOS.forEach((em, i) => {
    const s = document.createElement('span');
    s.textContent = em;
    const dur = 12 + Math.random() * 14;
    s.style.left              = `${5 + (i / DECOS.length) * 90}%`;
    s.style.fontSize          = `${1.5 + Math.random() * 1.5}rem`;
    s.style.animationDuration = `${dur}s`;
    s.style.animationDelay    = `${-(Math.random() * dur)}s`;
    bgWrap.appendChild(s);
  });

  // Game card clicks
  document.getElementById('card-colors').addEventListener('click',  () => startGame('colors'));
  document.getElementById('card-count').addEventListener('click',   () => startGame('count'));
  document.getElementById('card-shapes').addEventListener('click',  () => startGame('shapes'));
  document.getElementById('card-letters').addEventListener('click', () => startGame('letters'));

  // Timer buttons
  document.getElementById('tbtn-15').addEventListener('click', () => setTimer(15, 'tbtn-15'));
  document.getElementById('tbtn-20').addEventListener('click', () => setTimer(20, 'tbtn-20'));
  document.getElementById('tbtn-30').addEventListener('click', () => setTimer(30, 'tbtn-30'));

  // Nav
  document.getElementById('back-btn').addEventListener('click', goHome);
  document.getElementById('play-more-btn').addEventListener('click', goHome);
})();

/* ══════════════════════════════════════
   SCREEN MANAGEMENT
══════════════════════════════════════ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function goHome() {
  showScreen('home');
  refreshHomeStars();
  game = null;
}

/* ══════════════════════════════════════
   GAME FLOW
══════════════════════════════════════ */
function startGame(type) {
  game      = type;
  qIndex    = 0;
  sessionSc = 0;
  canAns    = true;
  document.getElementById('game-ttl').textContent   = GAME_TITLES[type];
  document.getElementById('game-score').textContent = '0';
  document.getElementById('prog-fill').style.width  = '0%';
  showScreen('game');
  nextQ();
}

function nextQ() {
  if (qIndex >= TOTAL_Q) { endGame(); return; }
  canAns = true;
  document.getElementById('prog-fill').style.width = `${(qIndex / TOTAL_Q) * 100}%`;

  const area = document.getElementById('game-area');
  area.style.opacity   = '0';
  area.style.transform = 'translateY(8px)';

  setTimeout(() => {
    hideAllGameSections();
    if      (game === 'colors')  setupColors();
    else if (game === 'count')   setupCount();
    else if (game === 'shapes')  setupShapes();
    else if (game === 'letters') setupLetters();

    area.style.transition = 'opacity .26s, transform .26s';
    area.style.opacity    = '1';
    area.style.transform  = 'translateY(0)';
  }, 120);
}

function hideAllGameSections() {
  ['cg-target','cg-opts','kg-animals','kg-nums',
   'sg-display','sg-opts','lg-big','lg-opts'].forEach(id => {
    document.getElementById(id).style.display = 'none';
  });
}

/* ══════════════════════════════════════
   COLOR GAME
══════════════════════════════════════ */
function setupColors() {
  const target = pick(COLORS);
  const opts   = shuffle([target, ...pickN(COLORS.filter(c => c.name !== target.name), 3)]);

  document.getElementById('q-text').textContent = 'Tap the matching color! 👇';

  const tgt = document.getElementById('cg-target');
  tgt.style.background = target.hex;
  tgt.style.display    = 'block';
  setTimeout(() => { tgt.classList.remove('pulse'); void tgt.offsetWidth; tgt.classList.add('pulse'); }, 40);

  const container = document.getElementById('cg-opts');
  container.style.display = 'grid';

  opts.forEach((color, i) => {
    const el = document.getElementById(`copt-${i}`);
    el.style.background = color.hex;
    el.textContent      = '';
    el.style.color      = '';
    el.style.fontSize   = '';
    el.className        = 'copt';
    el.onclick          = () => checkColor(el, color.name, target.name);
  });
}

function checkColor(el, chosen, correct) {
  if (!canAns) return;
  canAns = false;
  if (chosen === correct) {
    el.classList.add('is-correct');
    el.textContent = '✓';
    el.style.color    = '#fff';
    el.style.fontSize = '2rem';
    onCorrect();
  } else {
    el.classList.add('is-wrong');
    onWrong();
    setTimeout(() => { el.classList.remove('is-wrong'); canAns = true; }, 520);
  }
}

/* ══════════════════════════════════════
   COUNT GAME
══════════════════════════════════════ */
function setupCount() {
  const count    = 2 + Math.floor(Math.random() * 8); // 2–9
  const emoji    = pick(ANIMALS);
  const numSet   = new Set([count]);
  while (numSet.size < 8) numSet.add(1 + Math.floor(Math.random() * 9));
  const numArr   = shuffle([...numSet]).slice(0, 8);

  document.getElementById('q-text').textContent = `How many ${emoji} do you see? 🤔`;

  // Build animals
  const wrap = document.getElementById('kg-animals');
  wrap.replaceChildren(); // clear safely
  wrap.style.display = 'flex';
  for (let i = 0; i < count; i++) {
    const span = document.createElement('span');
    span.className   = 'anim';
    span.textContent = emoji;
    span.style.animationDelay = `${i * 0.07}s`;
    wrap.appendChild(span);
  }

  // Build number buttons
  const numsContainer = document.getElementById('kg-nums');
  numsContainer.style.display = 'grid';
  numArr.forEach((n, i) => {
    const el = document.getElementById(`nopt-${i}`);
    el.textContent    = n;
    el.className      = 'nopt';
    el.style.background = '';
    el.onclick        = () => checkCount(el, n, count);
  });
}

function checkCount(el, chosen, correct) {
  if (!canAns) return;
  canAns = false;
  if (chosen === correct) {
    el.style.background = 'var(--teal)';
    el.textContent = '✓';
    el.classList.add('is-correct');
    onCorrect();
  } else {
    el.style.background = 'var(--coral)';
    el.classList.add('is-wrong');
    onWrong();
    setTimeout(() => {
      el.style.background = 'var(--teal)';
      el.classList.remove('is-wrong');
      canAns = true;
    }, 520);
  }
}

/* ══════════════════════════════════════
   SHAPE GAME
══════════════════════════════════════ */
function setupShapes() {
  const idx    = Math.floor(Math.random() * SHAPE_NAMES.length);
  const target = SHAPE_NAMES[idx];
  const tColor = SHAPE_COLORS[idx];
  const opts   = shuffle([target, ...shuffle(SHAPE_NAMES.filter(s => s !== target)).slice(0, 3)]);

  document.getElementById('q-text').textContent = 'Find the same shape! 🔍';

  const display = document.getElementById('sg-display');
  display.replaceChildren(makeSVGShape(target, tColor, 100));
  display.style.display = 'flex';

  const optsContainer = document.getElementById('sg-opts');
  optsContainer.style.display = 'grid';

  opts.forEach((shape, i) => {
    const ci   = (SHAPE_NAMES.indexOf(shape) + i * 2) % SHAPE_COLORS.length;
    const el   = document.getElementById(`sopt-${i}`);
    el.className = 'sopt';
    el.replaceChildren(makeSVGShape(shape, SHAPE_COLORS[ci], 62));
    el.onclick = () => checkShape(el, shape, target);
  });
}

function makeSVGShape(name, color, size) {
  const NS  = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(NS, 'svg');
  svg.setAttribute('width',   size);
  svg.setAttribute('height',  size);
  svg.setAttribute('viewBox', '0 0 100 100');
  svg.style.filter = 'drop-shadow(2px 3px 0 rgba(0,0,0,.1))';

  let shape;
  if (name === 'Circle') {
    shape = document.createElementNS(NS, 'circle');
    shape.setAttribute('cx', '50'); shape.setAttribute('cy', '50'); shape.setAttribute('r', '42');
  } else if (name === 'Square') {
    shape = document.createElementNS(NS, 'rect');
    shape.setAttribute('x', '10'); shape.setAttribute('y', '10');
    shape.setAttribute('width', '80'); shape.setAttribute('height', '80');
    shape.setAttribute('rx', '10');
  } else if (name === 'Triangle') {
    shape = document.createElementNS(NS, 'polygon');
    shape.setAttribute('points', '50,8 93,92 7,92');
  } else if (name === 'Star') {
    shape = document.createElementNS(NS, 'polygon');
    shape.setAttribute('points', '50,5 61,35 95,35 68,57 79,91 50,70 21,91 32,57 5,35 39,35');
  } else if (name === 'Heart') {
    shape = document.createElementNS(NS, 'path');
    shape.setAttribute('d', 'M50,85 C50,85 8,60 8,35 C8,20 18,10 35,10 C43,10 50,18 50,18 C50,18 57,10 65,10 C82,10 92,20 92,35 C92,60 50,85 50,85Z');
  } else { // Diamond
    shape = document.createElementNS(NS, 'polygon');
    shape.setAttribute('points', '50,5 96,50 50,95 4,50');
  }
  shape.setAttribute('fill', color);
  svg.appendChild(shape);
  return svg;
}

function checkShape(el, chosen, correct) {
  if (!canAns) return;
  canAns = false;
  if (chosen === correct) {
    el.classList.add('is-correct', 'hi-correct');
    onCorrect();
  } else {
    el.classList.add('is-wrong', 'hi-wrong');
    onWrong();
    setTimeout(() => { el.classList.remove('is-wrong', 'hi-wrong'); canAns = true; }, 520);
  }
}

/* ══════════════════════════════════════
   LETTER GAME
══════════════════════════════════════ */
function setupLetters() {
  const target    = pick(LETTERS);
  const showUpper = Math.random() > 0.5;
  const display   = showUpper ? target.u : target.l;
  const matchKey  = showUpper ? 'l' : 'u';
  const qTxt      = showUpper ? 'Find the lowercase letter 👇' : 'Find the UPPERCASE letter 👇';
  const wrongs    = shuffle(LETTERS.filter(l => l.u !== target.u)).slice(0, 3);
  const opts      = shuffle([target, ...wrongs]);

  document.getElementById('q-text').textContent = qTxt;

  const big = document.getElementById('lg-big');
  big.textContent   = display;
  big.style.display = 'flex';

  const optsContainer = document.getElementById('lg-opts');
  optsContainer.style.display = 'grid';

  opts.forEach((letter, i) => {
    const el = document.getElementById(`lopt-${i}`);
    el.textContent = letter[matchKey];
    el.className   = 'lopt';
    el.onclick     = () => checkLetter(el, letter[matchKey], target[matchKey]);
  });
}

function checkLetter(el, chosen, correct) {
  if (!canAns) return;
  canAns = false;
  if (chosen === correct) {
    el.classList.add('is-correct', 'hi-correct');
    onCorrect();
  } else {
    el.classList.add('is-wrong', 'hi-wrong');
    onWrong();
    setTimeout(() => { el.classList.remove('is-wrong', 'hi-wrong'); canAns = true; }, 520);
  }
}

/* ══════════════════════════════════════
   ANSWER HANDLING
══════════════════════════════════════ */
function onCorrect() {
  sessionSc++;
  document.getElementById('game-score').textContent = sessionSc;
  showFeedback(pick(FB_CORRECT));
  spawnConfetti();
  setTimeout(() => { qIndex++; nextQ(); }, 830);
}

function onWrong() {
  showFeedback(pick(FB_WRONG));
}

function showFeedback(em) {
  const el = document.getElementById('feedback-emoji');
  el.textContent = em;
  el.classList.remove('hide');
  el.classList.add('show');
  setTimeout(() => {
    el.classList.remove('show');
    el.classList.add('hide');
    setTimeout(() => el.classList.remove('hide'), 300);
  }, 660);
}

/* ══════════════════════════════════════
   CONFETTI
══════════════════════════════════════ */
function spawnConfetti() {
  for (let i = 0; i < 22; i++) {
    const el      = document.createElement('div');
    const isCircle = Math.random() > 0.5;
    el.className  = 'confetti';
    el.style.left             = `${Math.random() * 100}vw`;
    el.style.top              = '-8px';
    el.style.background       = pick(CONF_COLORS);
    el.style.width            = `${5 + Math.random() * 8}px`;
    el.style.height           = `${5 + Math.random() * 8}px`;
    el.style.borderRadius     = isCircle ? '50%' : '2px';
    el.style.animationDelay   = `${Math.random() * 0.35}s`;
    el.style.animationDuration = `${1.1 + Math.random() * 0.9}s`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2300);
  }
}

/* ══════════════════════════════════════
   END GAME
══════════════════════════════════════ */
function endGame() {
  const earned = Math.min(3, Math.max(1, Math.ceil((sessionSc / TOTAL_Q) * 3)));
  totalStars  += earned;
  gameStars[game] = Math.max(gameStars[game], earned);

  document.getElementById('cel-stars').textContent =
    '⭐'.repeat(earned) + '☆'.repeat(3 - earned);
  document.getElementById('cel-total').textContent = totalStars;

  for (let b = 0; b < 4; b++) setTimeout(() => spawnConfetti(), b * 240);
  showScreen('celebration');
  refreshHomeStars();
}

function refreshHomeStars() {
  document.getElementById('total-stars-home').textContent = totalStars;
  Object.keys(gameStars).forEach(g => {
    const el = document.getElementById(`gs-${g}`);
    if (el) el.textContent = `⭐ ${gameStars[g]} star${gameStars[g] !== 1 ? 's' : ''}`;
  });
}

/* ══════════════════════════════════════
   TIMER
══════════════════════════════════════ */
function setTimer(min, btnId) {
  if (timerTick) clearInterval(timerTick);
  timerTot = timerSec = min * 60;
  document.querySelectorAll('.tbtn').forEach(b => b.classList.remove('on'));
  document.getElementById(btnId).classList.add('on');
  updateTimerDisplay();
  timerTick = setInterval(() => {
    timerSec--;
    updateTimerDisplay();
    if (timerSec <= 0) { clearInterval(timerTick); fireTimerAlert(); }
  }, 1000);
}

function updateTimerDisplay() {
  const m  = Math.floor(timerSec / 60);
  const s  = timerSec % 60;
  const cl = document.getElementById('timer-clock');
  cl.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  cl.classList.toggle('warn', timerSec > 0 && timerSec <= 120);
  const pct = timerTot > 0 ? ((timerTot - timerSec) / timerTot) * 100 : 0;
  document.getElementById('timer-fill').style.width = `${pct}%`;
}

function fireTimerAlert() {
  const el = document.getElementById('timer-alert');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 6500);
}

/* ══════════════════════════════════════
   UTILS
══════════════════════════════════════ */
function pick(arr)     { return arr[Math.floor(Math.random() * arr.length)]; }
function pickN(arr, n) { return shuffle(arr).slice(0, n); }
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
